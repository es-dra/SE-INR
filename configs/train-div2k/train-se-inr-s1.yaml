# Stage 1: SE-Decoder (FiLM Fusion + 1D Conv + Scale Readout) - 1000 epochs
# 正确配置: feat_unfold=true, num_layers=2, C_h=64

train_dataset:
  dataset:
    name: image-folder
    args:
      root_path: ../Data/DIV2K_train_HR
      repeat: 20
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
      scale_max: 4
      augment: true
      sample_q: 2304
  batch_size: 16

val_dataset:
  dataset:
    name: image-folder
    args:
      root_path: ../Data/DIV2K_valid_HR
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
      scale_max: 4
      sample_q: 2304
  batch_size: 16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: se-inr-s1
  args:
    encoder_spec:
      name: edsr-baseline
      args:
        no_upsampling: true
    # Stage 1 核心配置 (正确设置)
    K: 24
    omega_min: 1.0
    omega_max: 64.0
    C_h: 64
    num_layers: 2
    kernel_size: 3
    # LIIF 标准配置 (正确)
    local_ensemble: true
    feat_unfold: true

optimizer:
  name: adam
  args:
    lr: 1.e-4

epoch_max: 1000
multi_step_lr:
  milestones: [50, 100, 150, 200, 300, 400, 500, 600, 700, 800, 900]
  gamma: 0.5

epoch_val: 1
epoch_save: 50
