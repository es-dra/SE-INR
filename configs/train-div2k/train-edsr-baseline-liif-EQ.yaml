train_dataset:
  dataset:
    name: image-folder
    args:
      root_path: ../Data/DIV2K_train_HR
      repeat: 20
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
      scale_max: 4
      augment: true
      sample_q: 2304
  batch_size: 16

val_dataset:
  dataset:
    name: image-folder
    args:
      root_path: ../Data/DIV2K_valid_HR
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
      scale_max: 4
      sample_q: 2304
  batch_size: 16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: liif
  args:
    encoder_spec:
      name: edsr-eq-baseline
      args:
        no_upsampling: true
        kernel_size: 5
        res_scale: 0.1
    imnet_spec:
      name: e_mlp_2
      args: 
        out_dim: 3
        hidden_list: [512, 256, 256, 256]
    tranNum: 4
    cell_decode: true
    feat_unfold: true
    local_ensemble: true
        

optimizer:
  name: adam
  args:
    lr: 1.e-4
epoch_max: 1000
multi_step_lr:
  milestones: [200, 400, 600, 800]
  gamma: 0.5

epoch_val: 1
epoch_save: 50
